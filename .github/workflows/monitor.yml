name: Tender Monitor

on:
  schedule:
    # Mon-Fri 7am AEST/AEDT (21:00 UTC Sun-Thu)
    - cron: "0 21 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tender monitor
        run: python src/monitor.py

      - name: Commit new leads
        run: |
          git config user.name "tender-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p output
          git add -A output/
          git diff --staged --quiet || git commit -m "Update tender leads $(date -u +%Y-%m-%d)"
          git diff --staged --quiet || git push

      # Optional email digest. To enable:
      # 1. Add repo secrets: MAIL_USERNAME, MAIL_PASSWORD (Gmail app password), MAIL_TO
      # 2. Uncomment the block below.
